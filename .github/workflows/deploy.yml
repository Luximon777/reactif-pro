name: Deploy to OVH VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 51.91.124.85
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            echo "=== Debut du deploiement ==="

            mkdir -p /data/tmp

            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi
            echo "Node: $(node -v)"

            if ! command -v python3 &> /dev/null; then
              apt-get update && apt-get install -y python3 python3-venv python3-pip
            fi

            systemctl is-active mongod || systemctl start mongod

            echo "=== Synchronisation du code ==="
            if [ ! -d /data/app/.git ]; then
              rm -rf /data/app
              git clone https://github.com/Luximon777/reactif-pro.git /data/app
            else
              cd /data/app
              git fetch origin main
              git reset --hard origin/main
            fi
            cd /data/app
            echo "Commit: $(git log --oneline -1)"

            # === Frontend .env ===
            printf 'REACT_APP_BACKEND_URL=https://reactif.pro\nENABLE_HEALTH_CHECK=false\n' > /data/app/frontend/.env

            # === Backend .env ===
            printf 'MONGO_URL=mongodb://localhost:27017\nDB_NAME=reactif_pro\nCORS_ORIGINS=https://reactif.pro,https://www.reactif.pro\nEMERGENT_LLM_KEY=%s\n' '${{ secrets.EMERGENT_LLM_KEY }}' > /data/app/backend/.env
            echo "Backend .env contents:"
            cat /data/app/backend/.env | sed 's/\(EMERGENT_LLM_KEY=\).\{10\}/\1**********/'

            # === Build frontend ===
            echo "=== Build du frontend ==="
            cd /data/app/frontend
            export TMPDIR=/data/tmp
            export NODE_OPTIONS="--max-old-space-size=4096"
            if [ ! -d node_modules ]; then
              npm install --legacy-peer-deps
              npm install ajv@8 --save-dev --legacy-peer-deps
            fi
            npx craco build
            echo "Build OK"

            DEPLOY_DIR="/home/ubuntu/reactif-pro/frontend/build"
            mkdir -p "$(dirname $DEPLOY_DIR)"
            rm -rf "$DEPLOY_DIR"
            mv build "$DEPLOY_DIR"
            echo "Frontend deploye"

            # === Backend ===
            cd /data/app/backend
            if [ ! -d venv ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install -r requirements.txt --quiet --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/
            
            # === TEST DIRECT de la cle IA ===
            echo "=== Test LLM Key ==="
            cd /data/app/backend
            python3 -c "
from dotenv import load_dotenv
import os
load_dotenv('.env')
key = os.environ.get('EMERGENT_LLM_KEY', '')
print(f'Key loaded: {key[:12]}...{key[-4:]} (len={len(key)})')
from emergentintegrations.llm.chat import LlmChat, UserMessage
import asyncio
chat = LlmChat(api_key=key, session_id='deploy-test', system_message='Say OK').with_model('openai', 'gpt-5.2')
result = asyncio.run(chat.send_message(UserMessage(text='Say OK')))
print(f'LLM TEST: {result[:20]}')
" 2>&1 || echo "LLM TEST FAILED"
            
            deactivate

            # === Service backend ===
            cat > /etc/systemd/system/backend.service << 'SEOF'
            [Unit]
            Description=Reactif Pro Backend
            After=network.target mongod.service
            [Service]
            Type=simple
            User=root
            WorkingDirectory=/data/app/backend
            EnvironmentFile=/data/app/backend/.env
            ExecStart=/data/app/backend/venv/bin/uvicorn server:app --host 0.0.0.0 --port 8000
            Restart=always
            RestartSec=5
            [Install]
            WantedBy=multi-user.target
            SEOF
            sed -i 's/^            //' /etc/systemd/system/backend.service

            systemctl daemon-reload
            systemctl enable backend
            systemctl restart backend
            sleep 3
            systemctl is-active backend && echo "Backend running" || echo "Backend FAILED"

            nginx -t && systemctl reload nginx
            echo "=== DEPLOIEMENT TERMINE ==="
