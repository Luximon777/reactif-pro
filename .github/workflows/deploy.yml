name: Deploy to OVH VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 51.91.124.85
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            echo "=== Début du déploiement ==="
            cd ~/reactif-pro

            echo "=== Pull des dernières modifications ==="
            git pull origin main

            echo "=== Build du frontend ==="
            cd frontend
            npm install --legacy-peer-deps
            npm run build
            cd ..

            echo "=== Installation des dépendances backend ==="
            cd backend
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            deactivate
            cd ..

            echo "=== Redémarrage du backend ==="
            bash -c 'cd ~/reactif-pro/backend && source venv/bin/activate && PID=$(cat /tmp/reactif.pid 2>/dev/null); [ -n "$PID" ] && kill $PID 2>/dev/null; sleep 1; nohup uvicorn server:app --host 0.0.0.0 --port 8001 >> ~/uvicorn.log 2>&1 & echo $! > /tmp/reactif.pid'

            echo "=== Déploiement terminé avec succès ==="
