name: Deploy to OVH VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 51.91.124.85
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            echo "=== Debut du deploiement ==="

            echo "=== Pull des dernieres modifications ==="
            cd /data/app
            git pull origin main

            echo "=== Build du frontend ==="
            cd /data/app/frontend
            export TMPDIR=/data/tmp
            npm install --legacy-peer-deps
            REACT_APP_BACKEND_URL=https://reactif.pro npm run build
            rm -rf /data/www/html
            mv build /data/www/html

            echo "=== Installation des dependances backend ==="
            cd /data/app/backend
            source venv/bin/activate
            pip install -r requirements.txt --quiet --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/
            deactivate

            echo "=== Redemarrage du backend ==="
            systemctl restart backend

            echo "=== Deploiement termine avec succes ==="
