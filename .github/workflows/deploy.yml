name: Deploy to OVH VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 51.91.124.85
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            echo "=== Debut du deploiement ==="

            echo "=== Synchronisation forcee du code ==="
            cd /data/app
            git fetch origin main
            git reset --hard origin/main
            echo "Code synchronise: $(git log --oneline -1)"

            echo "=== Build du frontend ==="
            cd /data/app/frontend
            export TMPDIR=/data/tmp
            mkdir -p $TMPDIR
            npm install --legacy-peer-deps 2>&1 | tail -5
            REACT_APP_BACKEND_URL=https://reactif.pro npm run build 2>&1 | tail -5
            rm -rf /data/www/html
            mv build /data/www/html
            echo "Frontend build OK"

            echo "=== Installation des dependances backend ==="
            cd /data/app/backend
            source venv/bin/activate
            pip install -r requirements.txt --quiet --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/
            deactivate
            echo "Backend deps OK"

            echo "=== Redemarrage du backend ==="
            systemctl restart backend
            sleep 2
            systemctl is-active backend && echo "Backend running OK" || echo "Backend FAILED"

            echo "=== Deploiement termine avec succes ==="
