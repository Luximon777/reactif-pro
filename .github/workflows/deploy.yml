name: Deploy to OVH VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 51.91.124.85
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            echo "=== Debut du deploiement ==="

            mkdir -p /data/tmp /data/www/html

            echo "=== Installation de Node.js si absent ==="
            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi
            echo "Node: $(node -v) | NPM: $(npm -v)"

            echo "=== Installation de Python/pip si absent ==="
            if ! command -v python3 &> /dev/null; then
              apt-get update && apt-get install -y python3 python3-venv python3-pip
            fi

            echo "=== Clonage ou mise a jour du code ==="
            if [ ! -d /data/app/.git ]; then
              rm -rf /data/app
              git clone https://github.com/Luximon777/reactif-pro.git /data/app
            else
              cd /data/app
              git fetch origin main
              git reset --hard origin/main
            fi
            cd /data/app
            echo "Commit: $(git log --oneline -1)"

            echo "=== Configuration frontend .env ==="
            cat > /data/app/frontend/.env << 'ENVEOF'
            REACT_APP_BACKEND_URL=https://reactif.pro
            ENABLE_HEALTH_CHECK=false
            ENVEOF
            sed -i 's/^            //' /data/app/frontend/.env
            echo "Frontend .env:"
            cat /data/app/frontend/.env

            echo "=== Build du frontend ==="
            cd /data/app/frontend
            export TMPDIR=/data/tmp
            export NODE_OPTIONS="--max-old-space-size=4096"
            npm install --legacy-peer-deps
            echo "npm install OK"
            npx craco build || npm run build
            echo "Build OK"
            rm -rf /data/www/html
            mv build /data/www/html
            echo "Frontend deploye OK"

            echo "=== Installation backend ==="
            cd /data/app/backend
            if [ ! -d venv ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install -r requirements.txt --quiet --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/
            deactivate
            echo "Backend deps OK"

            echo "=== Redemarrage backend ==="
            if systemctl is-active backend &> /dev/null; then
              systemctl restart backend
            else
              echo "Service backend non configure"
            fi

            echo "=== DEPLOIEMENT TERMINE ==="
