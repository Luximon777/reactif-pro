name: Deploy to OVH VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 51.91.124.85
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            echo "=== Debut du deploiement ==="
            mkdir -p /data/tmp
            if ! command -v node > /dev/null 2>&1; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi
            echo "Node: $(node -v)"
            if ! command -v python3 > /dev/null 2>&1; then
              apt-get update && apt-get install -y python3 python3-venv python3-pip
            fi
            systemctl is-active mongod || systemctl start mongod
            echo "=== Synchronisation du code ==="
            if [ ! -d /data/app/.git ]; then
              rm -rf /data/app
              git clone https://github.com/Luximon777/reactif-pro.git /data/app
            else
              cd /data/app && git fetch origin main && git reset --hard origin/main
            fi
            cd /data/app
            echo "Commit: $(git log --oneline -1)"
            printf "REACT_APP_BACKEND_URL=https://reactif.pro\nENABLE_HEALTH_CHECK=false\n" > /data/app/frontend/.env
            printf "MONGO_URL=mongodb://localhost:27017\nDB_NAME=reactif_pro\nCORS_ORIGINS=https://reactif.pro,https://www.reactif.pro\nEMERGENT_LLM_KEY=${{ secrets.EMERGENT_LLM_KEY }}\n" > /data/app/backend/.env
            echo "Backend .env key length: $(wc -c < /data/app/backend/.env)"
            echo "=== Build du frontend ==="
            cd /data/app/frontend
            export TMPDIR=/data/tmp
            export NODE_OPTIONS="--max-old-space-size=4096"
            if [ ! -d node_modules ]; then
              npm install --legacy-peer-deps
              npm install ajv@8 --save-dev --legacy-peer-deps
            fi
            npx craco build
            echo "Build OK"
            DEPLOY_DIR="/home/ubuntu/reactif-pro/frontend/build"
            mkdir -p "$(dirname $DEPLOY_DIR)"
            rm -rf "$DEPLOY_DIR"
            mv build "$DEPLOY_DIR"
            echo "Frontend deploye"
            echo "=== Backend ==="
            cd /data/app/backend
            if [ ! -d venv ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install -r requirements.txt --quiet --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/
            echo "=== Test LLM Key ==="
            python3 /data/app/backend/test_key.py || echo "LLM TEST FAILED"
            deactivate
            printf "[Unit]\nDescription=Reactif Pro Backend\nAfter=network.target mongod.service\n[Service]\nType=simple\nUser=root\nWorkingDirectory=/data/app/backend\nEnvironmentFile=/data/app/backend/.env\nExecStart=/data/app/backend/venv/bin/uvicorn server:app --host 0.0.0.0 --port 8000\nRestart=always\nRestartSec=5\n[Install]\nWantedBy=multi-user.target\n" > /etc/systemd/system/backend.service
            systemctl daemon-reload
            systemctl stop backend || true
            sleep 2
            fuser -k 8000/tcp 2>/dev/null || true
            sleep 1
            find /data/app/backend -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
            systemctl enable backend
            systemctl start backend
            sleep 3
            systemctl is-active backend && echo "Backend running" || echo "Backend FAILED"
            echo "=== Verify Backend Env ==="
            cat /etc/systemd/system/backend.service | head -15
            echo "EnvironmentFile check:"
            grep -c "EMERGENT_LLM_KEY" /data/app/backend/.env && echo "Key present in .env"
            nginx -t && systemctl reload nginx
            echo "=== Test API post-deploy ==="
            sleep 3
            curl -s http://localhost:8000/api/ || echo "API test failed"
            echo ""
            echo "=== Process check ==="
            ps aux | grep uvicorn | grep -v grep || echo "No uvicorn process!"
            echo "=== Code version check ==="
            cd /data/app && git log --oneline -1
            grep "override" /data/app/backend/db.py
            grep "max_retries" /data/app/backend/helpers.py | head -1
            echo "=== DEPLOIEMENT TERMINE ==="
