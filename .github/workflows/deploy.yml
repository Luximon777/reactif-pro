name: Deploy to OVH VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 51.91.124.85
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          script: |
            set -e
            echo "=== Debut du deploiement ==="

            mkdir -p /data/tmp

            # === Node.js ===
            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
            fi
            echo "Node: $(node -v)"

            # === Python ===
            if ! command -v python3 &> /dev/null; then
              apt-get update && apt-get install -y python3 python3-venv python3-pip
            fi

            # === MongoDB ===
            if ! command -v mongod &> /dev/null; then
              apt-get update
              apt-get install -y gnupg curl
              curl -fsSL https://www.mongodb.org/static/pgp/server-7.0.asc | gpg --dearmor -o /usr/share/keyrings/mongodb-server-7.0.gpg
              echo "deb [ signed-by=/usr/share/keyrings/mongodb-server-7.0.gpg ] http://repo.mongodb.org/apt/debian bookworm/mongodb-org/7.0 main" | tee /etc/apt/sources.list.d/mongodb-org-7.0.list
              apt-get update
              apt-get install -y mongodb-org
              systemctl daemon-reload
              systemctl enable mongod
              systemctl start mongod
            else
              systemctl is-active mongod || systemctl start mongod
            fi

            # === Code source ===
            echo "=== Synchronisation du code ==="
            if [ ! -d /data/app/.git ]; then
              rm -rf /data/app
              git clone https://github.com/Luximon777/reactif-pro.git /data/app
            else
              cd /data/app
              git fetch origin main
              git reset --hard origin/main
            fi
            cd /data/app
            echo "Commit: $(git log --oneline -1)"

            # === Frontend .env ===
            cat > /data/app/frontend/.env << 'FEOF'
            REACT_APP_BACKEND_URL=https://reactif.pro
            ENABLE_HEALTH_CHECK=false
            FEOF
            sed -i 's/^            //' /data/app/frontend/.env

            # === Backend .env (using GitHub secret) ===
            echo "MONGO_URL=mongodb://localhost:27017" > /data/app/backend/.env
            echo "DB_NAME=reactif_pro" >> /data/app/backend/.env
            echo "CORS_ORIGINS=https://reactif.pro,https://www.reactif.pro" >> /data/app/backend/.env
            echo "EMERGENT_LLM_KEY=${{ secrets.EMERGENT_LLM_KEY }}" >> /data/app/backend/.env
            echo "Backend .env key length: $(grep EMERGENT_LLM_KEY /data/app/backend/.env | cut -d= -f2 | wc -c)"

            # === Build frontend ===
            echo "=== Build du frontend ==="
            cd /data/app/frontend
            export TMPDIR=/data/tmp
            export NODE_OPTIONS="--max-old-space-size=4096"
            if [ ! -d node_modules ]; then
              npm install --legacy-peer-deps
              npm install ajv@8 --save-dev --legacy-peer-deps
            fi
            npx craco build
            echo "Build OK"

            DEPLOY_DIR="/home/ubuntu/reactif-pro/frontend/build"
            mkdir -p "$(dirname $DEPLOY_DIR)"
            rm -rf "$DEPLOY_DIR"
            mv build "$DEPLOY_DIR"
            echo "Frontend deploye"

            # === Backend ===
            echo "=== Backend ==="
            cd /data/app/backend
            if [ ! -d venv ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install -r requirements.txt --quiet --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/
            deactivate

            # === Service backend ===
            cat > /etc/systemd/system/backend.service << 'SEOF'
            [Unit]
            Description=Reactif Pro Backend
            After=network.target mongod.service

            [Service]
            Type=simple
            User=root
            WorkingDirectory=/data/app/backend
            EnvironmentFile=/data/app/backend/.env
            ExecStart=/data/app/backend/venv/bin/uvicorn server:app --host 0.0.0.0 --port 8000
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            SEOF
            sed -i 's/^            //' /etc/systemd/system/backend.service

            systemctl daemon-reload
            systemctl enable backend
            systemctl restart backend
            sleep 3
            systemctl is-active backend && echo "Backend running" || echo "Backend FAILED"

            nginx -t && systemctl reload nginx
            echo "=== DEPLOIEMENT TERMINE ==="
